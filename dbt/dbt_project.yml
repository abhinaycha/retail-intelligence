name: 'retail_intelligence'
version: '1.0.0'
config-version: 2

profile: 'retail_intelligence'

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
docs-paths: ["docs"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  retail_intelligence:
    silver:
      +materialized: incremental
      +incremental_strategy: merge
      +schema: silver
      +tags: ["silver"]
    gold:
      +materialized: table
      +schema: gold
      +tags: ["gold"]
    semantic:
      +materialized: table
      +schema: gold
      +tags: ["semantic"]

snapshots:
  retail_intelligence:
    +target_schema: silver
    +strategy: timestamp
    +updated_at: _updated_at

vars:
  catalog: retail_intelligence
  start_date: '2022-01-01'
